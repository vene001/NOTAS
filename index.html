<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Caderno Digital & Anotações</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background-color: #0f172a; color: #f1f5f9; height: 100vh; overflow: hidden; user-select: none; }
    .app-layout { display: flex; height: 100vh; width: 100vw; }

    /* Sidebar */
    .sidebar { width: 300px; background-color: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 16px; overflow-y: auto; }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #334155; }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand h2 { font-size: 16px; font-weight: 700; color: #f8fafc; }
    
    .user-profile { display: flex; align-items: center; gap: 10px; padding: 8px; background: #0f172a; border-radius: 8px; margin-bottom: 16px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
    .user-info { display: flex; flex-direction: column; }
    .user-name { font-size: 13px; font-weight: 600; color: #f8fafc; }
    .user-status { font-size: 10px; color: #38bdf8; font-weight: bold; }

    .section-title { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; margin-top: 12px; margin-bottom: 8px; }
    .icon-btn { background: #334155; color: #f8fafc; border: none; border-radius: 4px; padding: 2px 6px; font-size: 12px; cursor: pointer; }
    .icon-btn:hover { background: #2563eb; }

    .folder-tree, .note-list, .audio-list { list-style: none; margin-bottom: 12px; }
    .tree-item, .note-item, .audio-item { padding: 6px 8px; border-radius: 6px; font-size: 13px; color: #cbd5e1; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .tree-item:hover, .note-item:hover, .audio-item:hover { background: #334155; }
    .tree-item.active, .note-item.active { background: #2563eb; color: #ffffff; font-weight: 600; }
    .subfolder { margin-left: 14px; border-left: 1px dashed #475569; padding-left: 6px; }
    .item-actions { display: none; gap: 4px; }
    .tree-item:hover .item-actions, .note-item:hover .item-actions, .audio-item:hover .item-actions { display: flex; }

    .audio-item { background: #0f172a; border: 1px solid #334155; flex-direction: column; align-items: flex-start; gap: 4px; }
    .audio-item-header { display: flex; justify-content: space-between; width: 100%; font-size: 11px; color: #38bdf8; }

    /* Area Principal */
    .main-editor { flex: 1; display: flex; flex-direction: column; background-color: #0f172a; }
    .editor-header { height: 56px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
    #note-title-input { background: transparent; border: 1px solid transparent; color: #f8fafc; font-size: 16px; font-weight: 600; padding: 4px 8px; border-radius: 4px; outline: none; }
    #note-title-input:focus { border-color: #3b82f6; background: #0f172a; }

    .actions-bar { display: flex; gap: 8px; align-items: center; }
    .btn { padding: 6px 12px; font-size: 12px; font-weight: 500; border-radius: 6px; border: none; cursor: pointer; }
    .btn-secondary { background: #334155; color: #f8fafc; }
    .btn-secondary:hover { background: #475569; }
    .btn-danger-soft { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }

    /* Painel do Gravador */
    .audio-panel { background: #182232; padding: 8px 16px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; font-size: 12px; }
    #rec-timer { font-family: monospace; font-size: 14px; color: #ef4444; font-weight: bold; }

    /* Barra de Ferramentas / Caderno */
    .drawing-toolbar { height: 56px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-wrap: wrap; }
    .tool-group { display: flex; align-items: center; gap: 6px; }
    .tool-btn { background: #334155; color: #cbd5e1; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .tool-btn.active { background: #2563eb; color: #ffffff; font-weight: 600; }
    .preset-btn { background: #0f172a; border: 1px solid #334155; color: #cbd5e1; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .preset-btn.active { border-color: #38bdf8; color: #38bdf8; }

    .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
    .color-dot.active { border-color: #ffffff; transform: scale(1.15); }

    /* Viewport e Zoom */
    .canvas-viewport { flex: 1; overflow: auto; background-color: #0b0f19; display: flex; justify-content: center; align-items: flex-start; padding: 20px; position: relative; }
    .page-sheet { background: #18181b; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border-radius: 4px; position: relative; background-image: linear-gradient(#27272a 1px, transparent 1px); background-size: 100% 28px; transform-origin: top center; transition: transform 0.1s ease-out; }
    #paint-canvas { display: block; cursor: crosshair; touch-action: none; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand"><span>📘</span><h2>FreeNotes Caderno</h2></div>
      </div>

      <div class="user-profile">
        <div class="user-avatar" id="user-avatar">U</div>
        <div class="user-info">
          <span class="user-name" id="user-name">Usuário</span>
          <span class="user-status" id="user-status">⚡ Premium</span>
        </div>
      </div>

      <div class="section-title">PASTAS <button id="btn-add-folder" class="icon-btn">+ Pasta</button></div>
      <ul id="folder-tree" class="folder-tree"></ul>

      <div class="section-title">NOTAS <button id="btn-add-note" class="icon-btn">+ Nota</button></div>
      <ul id="note-list" class="note-list"></ul>

      <div class="section-title">🎙️ PASTA DE ÁUDIOS GRAVADOS</div>
      <ul id="audio-list" class="audio-list"></ul>
    </aside>

    <main class="main-editor">
      <header class="editor-header">
        <div class="note-info">
          <input type="text" id="note-title-input" value="Página de Caderno">
        </div>

        <div class="actions-bar">
          <button id="btn-export-pdf" class="btn btn-secondary">📄 Exportar PDF</button>
          <button id="btn-transfer-export" class="btn btn-secondary">🔄 Exportar (JSON)</button>
          <label class="btn btn-secondary">
            📥 Importar
            <input type="file" id="btn-transfer-import" accept=".json" style="display:none;">
          </label>
        </div>
      </header>

      <!-- Gravador de Voz Avançado -->
      <div class="audio-panel">
        <span>🎙️ Gravador de Áudio:</span>
        <button id="btn-rec-audio" class="btn btn-secondary">🔴 Iniciar Gravação</button>
        <button id="btn-stop-audio" class="btn btn-danger-soft" disabled>⏹️ Parar e Salvar</button>
        <span id="rec-timer" style="display:none;">00:00</span>
      </div>

      <!-- Barra de Ferramentas de Escrita (Estilo Caderno) -->
      <div class="drawing-toolbar">
        <div class="tool-group">
          <button class="tool-btn active" data-type="pen">✏️ Esferográfica</button>
          <button class="tool-btn" data-type="fountain">🖋️ Tinteiro</button>
          <button class="tool-btn" data-type="highlighter">🖍️ Marca-texto</button>
          <button class="tool-btn" data-type="eraser">🧹 Borracha</button>
        </div>

        <!-- Atributos de Caneta (Fina / Média / Grossa) -->
        <div class="tool-group">
          <span style="font-size: 11px; color: #94a3b8;">Espessura:</span>
          <button class="preset-btn active" data-size="2">Fina</button>
          <button class="preset-btn" data-size="5">Média</button>
          <button class="preset-btn" data-size="12">Grossa</button>
          <input type="range" id="brush-size" min="1" max="30" value="2" style="width:60px;">
        </div>

        <!-- Cores -->
        <div class="tool-group colors">
          <button class="color-dot active" data-color="#ffffff" style="background:#ffffff;"></button>
          <button class="color-dot" data-color="#38bdf8" style="background:#38bdf8;"></button>
          <button class="color-dot" data-color="#ef4444" style="background:#ef4444;"></button>
          <button class="color-dot" data-color="#22c55e" style="background:#22c55e;"></button>
          <button class="color-dot" data-color="#eab308" style="background:#eab308;"></button>
          <input type="color" id="custom-color-picker" value="#ffffff" style="width:20px; height:20px; border:none; background:none;">
        </div>

        <!-- Controles de Zoom -->
        <div class="tool-group" style="margin-left: auto;">
          <button id="btn-zoom-out" class="tool-btn">🔍 -</button>
          <span id="zoom-val" style="font-size: 11px; color: #38bdf8;">100%</span>
          <button id="btn-zoom-in" class="tool-btn">🔍 +</button>
          <button id="btn-zoom-reset" class="tool-btn">Reset</button>
        </div>
      </div>

      <!-- Caderno / Folha de Escrever -->
      <div class="canvas-viewport" id="viewport">
        <div class="page-sheet" id="sheet">
          <canvas id="paint-canvas" width="750" height="1000"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script>
    const appState = {
      profile: { name: 'Usuário', status: '⚡ Premium', avatar: 'U' },
      folders: [
        { id: 'f_root', name: 'Cadernos', icon: '📘', color: '#38bdf8', parentId: null }
      ],
      notes: [
        { id: 'n_1', folderId: 'f_root', title: 'Minhas Anotações com Caneta', canvasData: null }
      ],
      audios: [], // Áudios gravados salvos
      activeFolderId: 'f_root',
      activeNoteId: 'n_1',
      tool: 'pen',
      color: '#ffffff',
      brushSize: 2,
      zoom: 1,
      isDrawing: false
    };

    const canvas = document.getElementById('paint-canvas');
    const ctx = canvas.getContext('2d');
    const sheet = document.getElementById('sheet');

    let mediaRecorder, audioChunks = [], recInterval, recSeconds = 0;

    function loadState() {
      const saved = localStorage.getItem('app_freenotes_data');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          appState.profile = parsed.profile || appState.profile;
          appState.folders = parsed.folders || appState.folders;
          appState.notes = parsed.notes || appState.notes;
          appState.audios = parsed.audios || [];
          appState.activeFolderId = parsed.activeFolderId || appState.folders[0].id;
          appState.activeNoteId = parsed.activeNoteId || appState.notes[0]?.id;
        } catch(e) {}
      }
      document.getElementById('user-name').textContent = appState.profile.name;
      document.getElementById('user-status').textContent = appState.profile.status;
      document.getElementById('user-avatar').textContent = appState.profile.avatar;
    }

    function saveState() {
      saveCurrentNoteData();
      localStorage.setItem('app_freenotes_data', JSON.stringify(appState));
    }

    function saveCurrentNoteData() {
      const currentNote = appState.notes.find(n => n.id === appState.activeNoteId);
      if (currentNote) {
        currentNote.canvasData = canvas.toDataURL();
        currentNote.title = document.getElementById('note-title-input').value || 'Sem Título';
      }
    }

    /* Pastas e Árvore */
    function renderFolders() {
      const container = document.getElementById('folder-tree');
      container.innerHTML = '';
      appState.folders.forEach(folder => {
        const li = document.createElement('li');
        li.className = `tree-item ${folder.id === appState.activeFolderId ? 'active' : ''}`;
        li.innerHTML = `<span style="color:${folder.color};">${folder.icon} ${folder.name}</span>`;
        li.onclick = () => { appState.activeFolderId = folder.id; renderFolders(); renderNotes(); };
        container.appendChild(li);
      });
    }

    /* Notas */
    function renderNotes() {
      const list = document.getElementById('note-list');
      list.innerHTML = '';
      const filtered = appState.notes.filter(n => n.folderId === appState.activeFolderId);
      filtered.forEach(note => {
        const li = document.createElement('li');
        li.className = `note-item ${note.id === appState.activeNoteId ? 'active' : ''}`;
        li.innerHTML = `<span>📝 ${note.title}</span>`;
        li.onclick = () => {
          saveCurrentNoteData();
          appState.activeNoteId = note.id;
          renderNotes(); loadActiveNoteContent(); saveState();
        };
        list.appendChild(li);
      });
    }

    function loadActiveNoteContent() {
      const note = appState.notes.find(n => n.id === appState.activeNoteId);
      if (!note) return;
      document.getElementById('note-title-input').value = note.title;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (note.canvasData) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = note.canvasData;
      }
    }

    /* Pasta de Áudios Gravados */
    function renderAudioList() {
      const list = document.getElementById('audio-list');
      list.innerHTML = '';
      if (appState.audios.length === 0) {
        list.innerHTML = '<li style="font-size:11px; color:#64748b; padding:4px;">Nenhum áudio gravado</li>';
        return;
      }
      appState.audios.forEach((aud, idx) => {
        const li = document.createElement('li');
        li.className = 'audio-item';
        li.innerHTML = `
          <div class="audio-item-header">
            <span>🎙️ ${aud.name}</span>
            <span>⏱️ ${aud.duration}</span>
          </div>
          <audio src="${aud.src}" controls style="width:100%; height:26px; margin-top:4px;"></audio>
        `;
        list.appendChild(li);
      });
    }

    /* Motor de Escrita Estilo Caderno (Vision Pen / Tablet) */
    function initCanvasEngine() {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) / appState.zoom,
          y: (clientY - rect.top) / appState.zoom
        };
      }

      function startStroke(e) {
        appState.isDrawing = true;
        const p = getCoords(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      }

      function drawStroke(e) {
        if (!appState.isDrawing) return;
        const p = getCoords(e);

        if (appState.tool === 'eraser') {
          ctx.strokeStyle = '#18181b';
          ctx.lineWidth = appState.brushSize * 5;
        } else if (appState.tool === 'highlighter') {
          ctx.strokeStyle = appState.color + '33'; // Transparência
          ctx.lineWidth = appState.brushSize * 4;
        } else if (appState.tool === 'fountain') {
          ctx.strokeStyle = appState.color;
          ctx.lineWidth = appState.brushSize * 1.5;
        } else { // Esferográfica
          ctx.strokeStyle = appState.color;
          ctx.lineWidth = appState.brushSize;
        }

        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }

      function stopStroke() {
        if (appState.isDrawing) {
          appState.isDrawing = false;
          saveState();
        }
      }

      // Suporte a Caneta (Stylus) e Toque
      canvas.addEventListener('pointerdown', startStroke);
      canvas.addEventListener('pointermove', drawStroke);
      canvas.addEventListener('pointerup', stopStroke);
      canvas.addEventListener('pointerleave', stopStroke);
    }

    /* Gravador de Áudio Funcional */
    function initAudioRecorder() {
      const btnRec = document.getElementById('btn-rec-audio');
      const btnStop = document.getElementById('btn-stop-audio');
      const timer = document.getElementById('rec-timer');

      btnRec.onclick = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onloadend = () => {
              const mins = Math.floor(recSeconds / 60).toString().padStart(2, '0');
              const secs = (recSeconds % 60).toString().padStart(2, '0');
              const durationStr = `${mins}:${secs}`;
              
              const newAudio = {
                id: 'aud_' + Date.now(),
                name: `Áudio ${appState.audios.length + 1}`,
                duration: durationStr,
                src: reader.result,
                date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
              };

              appState.audios.unshift(newAudio);
              renderAudioList();
              saveState();
            };
            reader.readAsDataURL(blob);
          };

          mediaRecorder.start();
          recSeconds = 0;
          timer.style.display = 'inline';
          timer.textContent = '00:00';
          recInterval = setInterval(() => {
            recSeconds++;
            const m = Math.floor(recSeconds / 60).toString().padStart(2, '0');
            const s = (recSeconds % 60).toString().padStart(2, '0');
            timer.textContent = `${m}:${s}`;
          }, 1000);

          btnRec.disabled = true;
          btnStop.disabled = false;
        } catch(e) {
          alert('Erro ao acessar o microfone para gravação!');
        }
      };

      btnStop.onclick = () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        clearInterval(recInterval);
        timer.style.display = 'none';
        btnRec.disabled = false;
        btnStop.disabled = true;
      };
    }

    /* Sistema de Zoom */
    function initZoom() {
      const val = document.getElementById('zoom-val');
      function updateZoom() {
        sheet.style.transform = `scale(${appState.zoom})`;
        val.textContent = Math.round(appState.zoom * 100) + '%';
      }

      document.getElementById('btn-zoom-in').onclick = () => { appState.zoom = Math.min(2.5, appState.zoom + 0.15); updateZoom(); };
      document.getElementById('btn-zoom-out').onclick = () => { appState.zoom = Math.max(0.5, appState.zoom - 0.15); updateZoom(); };
      document.getElementById('btn-zoom-reset').onclick = () => { appState.zoom = 1; updateZoom(); };
    }

    /* Controles de UI */
    function initControls() {
      // Tipo de Caneta
      document.querySelectorAll('.drawing-toolbar .tool-btn[data-type]').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.drawing-toolbar .tool-btn[data-type]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          appState.tool = btn.dataset.type;
        };
      });

      // Espessuras Predefinidas
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          appState.brushSize = parseInt(btn.dataset.size);
          document.getElementById('brush-size').value = appState.brushSize;
        };
      });

      document.getElementById('brush-size').oninput = (e) => appState.brushSize = parseInt(e.target.value);

      // Cores
      document.querySelectorAll('.color-dot').forEach(dot => {
        dot.onclick = () => {
          document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
          dot.classList.add('active');
          appState.color = dot.dataset.color;
        };
      });

      document.getElementById('custom-color-picker').oninput = (e) => appState.color = e.target.value;

      document.getElementById('btn-add-folder').onclick = () => {
        const name = prompt('Nome do Caderno:');
        if (name) {
          appState.folders.push({ id: 'f_' + Date.now(), name, icon: '📘', color: '#38bdf8', parentId: null });
          renderFolders(); saveState();
        }
      };

      document.getElementById('btn-add-note').onclick = () => {
        const n = { id: 'n_' + Date.now(), folderId: appState.activeFolderId, title: 'Página de Caderno', canvasData: null };
        appState.notes.push(n); appState.activeNoteId = n.id;
        renderNotes(); loadActiveNoteContent(); saveState();
      };

      document.getElementById('note-title-input').onchange = () => { saveState(); renderNotes(); };

      // PDF
      document.getElementById('btn-export-pdf').onclick = () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/png');
        pdf.addImage(imgData, 'PNG', 10, 10, 190, 250);
        pdf.save('caderno_anotacoes.pdf');
      };
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadState();
      initCanvasEngine();
      initAudioRecorder();
      initZoom();
      initControls();
      renderFolders();
      renderNotes();
      renderAudioList();
      loadActiveNoteContent();
    });
  </script>
</body>
</html>
