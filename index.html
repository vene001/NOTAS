<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estudy-Site</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --accent: #58a6ff;
      --accent-glow: #1f6feb;
      --text: #c9d1d9;
      --gold: #ffd700;
      --danger: #f85149;
      --success: #2ea043;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Animação Dinossauro e Dinheiro no Fundo do Chat Geral */
    .falling-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .falling-item {
      position: absolute;
      top: -50px;
      font-size: 24px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(105vh) rotate(360deg);
      }
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
      margin-bottom: 20px;
    }

    /* Cabeçalho e Perfil */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #30363d;
      padding-bottom: 15px;
      margin-bottom: 15px;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .profile-pic {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
    }

    .user-details {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-weight: bold;
      font-size: 1.1rem;
      color: #fff;
    }

    .user-bio {
      font-size: 0.85rem;
      color: #8b949e;
    }

    .badge-premium {
      background: linear-gradient(45deg, #ffd700, #ffa500);
      color: #000;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 5px;
      display: none;
    }

    /* Ícone de Solicitações/Notificações */
    .notification-wrapper {
      position: relative;
      cursor: pointer;
    }

    .notification-icon {
      font-size: 1.5rem;
      background: #21262d;
      padding: 8px;
      border-radius: 50%;
      border: 1px solid #30363d;
    }

    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--danger);
      color: white;
      font-size: 0.75rem;
      border-radius: 50%;
      padding: 2px 6px;
      font-weight: bold;
      display: none;
    }

    /* Seção de Mídia e Pastas */
    .accordion-item {
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .accordion-header {
      background: #21262d;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
    }

    .accordion-header .arrow {
      transition: transform 0.3s;
    }

    .accordion-header.active .arrow {
      transform: rotate(180deg);
    }

    .accordion-content {
      display: none;
      padding: 12px;
      background: #161b22;
    }

    /* Barra de Pesquisa de Grupos */
    .search-bar-container {
      margin: 15px 0;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      user-select: none;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Lista de Grupos Pesquisados */
    .group-list {
      margin-top: 10px;
    }

    .group-item {
      background: #21262d;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Botões Gerais */
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }
    .btn-gold { background: var(--gold); color: #000; }

    /* Modais / Abas Pop-up */
    .modal-overlay {
      position: fixed;
      top:0; left:0; width:100vw; height:100vh;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .modal-content {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
      position: relative;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* Modal Criar Grupo com Bordas Brilhantes (Apenas Premium) */
    .modal-premium-glow {
      border: 2px solid transparent;
      animation: glowBorder 2s linear infinite alternate;
    }

    @keyframes glowBorder {
      0% {
        border-color: var(--accent);
        box-shadow: 0 0 10px var(--accent);
      }
      50% {
        border-color: #a855f7;
        box-shadow: 0 0 20px #a855f7;
      }
      100% {
        border-color: var(--gold);
        box-shadow: 0 0 15px var(--gold);
      }
    }

    .modal-content h3 {
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group input, .form-group textarea {
      padding: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #fff;
    }

    /* Lista de Solicitações */
    .request-card {
      background: #21262d;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      user-select: none;
    }

    .request-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    /* Chat Geral */
    .chat-section {
      margin-top: 20px;
      border-top: 1px solid #30363d;
      padding-top: 15px;
    }

    .chat-box {
      height: 200px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px;
      overflow-y: auto;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-message {
      background: #21262d;
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 80%;
      word-break: break-word;
    }

    .chat-input-area {
      display: flex;
      gap: 10px;
    }

    .chat-input-area input {
      flex: 1;
      padding: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #fff;
    }

    /* Menu de contexto ao segurar mensagem */
    .context-menu {
      position: fixed;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px;
      display: none;
      z-index: 20;
    }
  </style>
</head>
<body>

  <!-- Efeito Visual no Chat Geral (Dinossauro e Dinheiro) -->
  <div class="falling-container" id="fallingContainer"></div>

  <div class="container">
    <!-- Cabeçalho com Perfil e Solicitações -->
    <div class="header">
      <div class="profile-info" onclick="openProfileModal()">
        <img src="https://via.placeholder.com/50" id="userPhoto" class="profile-pic" alt="Foto" />
        <div class="user-details">
          <div>
            <span id="userNameDisplay" class="user-name">Usuário</span>
            <span id="premiumBadge" class="badge-premium">PREMIUM</span>
          </div>
          <span id="userBioDisplay" class="user-bio">Sua bio aparecerá aqui...</span>
        </div>
      </div>

      <!-- Ícone de Solicitações (Acima/Ao lado do Chat) -->
      <div class="notification-wrapper" onclick="openRequestsModal()">
        <div class="notification-icon">💬</div>
        <span class="notification-badge" id="notifBadge">0</span>
      </div>
    </div>

    <!-- Seção de Áudios Gravados -->
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span>🎙️ Áudios Gravados</span>
        <span class="arrow">▼</span>
      </div>
      <div class="accordion-content">
        <p style="font-size: 0.85rem; color: #8b949e;">Nenhum áudio gravado no momento.</p>
      </div>
    </div>

    <!-- Barra de Pesquisa de Grupos (Após a pasta de áudios) -->
    <div class="search-bar-container">
      <input 
        type="text" 
        id="groupSearchInput" 
        class="search-input" 
        placeholder="Pesquisar grupo por nome... (Pressione e segure para criar grupo)" 
        oninput="searchGroups()"
      />
      <div class="group-list" id="groupList"></div>
    </div>

    <!-- Botão de Ativação Premium com Pagamento PIX -->
    <div style="margin-bottom: 15px;">
      <button class="btn btn-gold" style="width: 100%;" onclick="openPixModal()">⚡ Adquirir Premium (PIX)</button>
    </div>

    <!-- Chat Geral -->
    <div class="chat-section">
      <h3>Chat Geral</h3>
      <div class="chat-box" id="chatBox"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Digite sua mensagem..." />
        <button class="btn" onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Perfil -->
  <div class="modal-overlay" id="profileModal">
    <div class="modal-content">
      <h3>Editar Perfil</h3>
      <div class="form-group">
        <label>URL da Foto:</label>
        <input type="text" id="editPhoto" />
      </div>
      <div class="form-group">
        <label>Nome:</label>
        <input type="text" id="editName" />
      </div>
      <div class="form-group">
        <label>Bio:</label>
        <textarea id="editBio" rows="3"></textarea>
      </div>
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
        <button class="btn btn-danger" onclick="closeModal('profileModal')">Cancelar</button>
        <button class="btn btn-success" onclick="saveProfile()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Criar Grupo (Apenas Premium / Bordas Brilhantes) -->
  <div class="modal-overlay" id="createGroupModal">
    <div class="modal-content modal-premium-glow">
      <h3>Criar Grupo <span style="font-size: 0.8rem; color: var(--gold);">(Somente Premium)</span></h3>
      <div class="form-group">
        <label>Nome do Grupo:</label>
        <input type="text" id="groupNameInput" />
      </div>
      <div class="form-group">
        <label>Bio do Grupo:</label>
        <textarea id="groupBioInput" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>ID do Grupo (Aleatório):</label>
        <input type="text" id="groupIdInput" readonly />
      </div>
      <div class="form-group">
        <label>Adicionar Membro (Nome ou ID):</label>
        <input type="text" id="groupMemberInput" placeholder="Digite o nome ou ID..." />
      </div>
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
        <button class="btn btn-danger" onclick="closeModal('createGroupModal')">Cancelar</button>
        <button class="btn btn-success" onclick="confirmCreateGroup()">Criar e Convidar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Solicitações de Adição em Grupos -->
  <div class="modal-overlay" id="requestsModal">
    <div class="modal-content">
      <h3>Convites para Grupos</h3>
      <div id="requestsList">
        <!-- Notificações aparecem aqui -->
      </div>
      <button class="btn btn-danger" style="width: 100%; margin-top: 10px;" onclick="closeModal('requestsModal')">Fechar</button>
    </div>
  </div>

  <!-- MODAL: Pagamento PIX -->
  <div class="modal-overlay" id="pixModal">
    <div class="modal-content" style="text-align: center;">
      <h3>Pagamento via PIX</h3>
      <p style="font-size: 0.9rem; margin: 10px 0;">Escaneie ou copie a chave PIX abaixo para ativar seu status **Premium**:</p>
      <div style="background: #fff; padding: 10px; display: inline-block; border-radius: 8px; margin: 10px 0;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=ESTUDY-SITE-PREMIUM-PAYMENT" alt="QR Code PIX" />
      </div>
      <div class="form-group">
        <input type="text" id="pixKey" value="00020126360014BR.GOV.BCB.PIX0114+5500000000000520400005303986540510.005802BR5913Estudy-Site6008BRASILIA62070503***6304E2CA" readonly />
      </div>
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
        <button class="btn" onclick="copyPix()">Copiar Chave</button>
        <button class="btn btn-success" onclick="simulatePixPayment()">Confirmar Pagamento</button>
      </div>
      <button class="btn btn-danger" style="width: 100%; margin-top: 10px;" onclick="closeModal('pixModal')">Cancelar</button>
    </div>
  </div>

  <!-- Menu de Contexto para Excluir Solicitação/Mensagem -->
  <div class="context-menu" id="contextMenu">
    <button class="btn btn-danger" onclick="deleteTargetItem()">Excluir</button>
  </div>

  <script>
    // --- ESTADOS NATIVOS E PERSISTÊNCIA DE DADOS ---
    let userData = {
      name: "Usuário",
      bio: "Sua bio aparecerá aqui...",
      photo: "https://via.placeholder.com/50",
      isPremium: false
    };

    let groups = [
      { id: "1092", name: "Grupo de Estudos TI", bio: "Focado em programação" },
      { id: "4839", name: "Matemática Avançada", bio: "Resolução de cálculos" }
    ];

    let requests = [
      { id: 1, senderName: "Fulano", senderId: "9982", groupName: "Grupo de Estudos TI" }
    ];

    let targetToDelete = null;
    let holdTimer = null;

    // --- CARREGAMENTO INICIAL ---
    window.onload = function() {
      loadProfile();
      renderRequests();
      initFallingEffects();
      setupHoldToCreateGroup();
    };

    function loadProfile() {
      const saved = localStorage.getItem("estudy_user");
      if (saved) {
        userData = JSON.parse(saved);
      }
      document.getElementById("userNameDisplay").innerText = userData.name;
      document.getElementById("userBioDisplay").innerText = userData.bio;
      document.getElementById("userPhoto").src = userData.photo;
      if (userData.isPremium) {
        document.getElementById("premiumBadge").style.display = "inline-block";
      }
    }

    function saveProfile() {
      userData.name = document.getElementById("editName").value || userData.name;
      userData.bio = document.getElementById("editBio").value || userData.bio;
      userData.photo = document.getElementById("editPhoto").value || userData.photo;
      
      localStorage.setItem("estudy_user", JSON.stringify(userData));
      loadProfile();
      closeModal("profileModal");
    }

    function openProfileModal() {
      document.getElementById("editName").value = userData.name;
      document.getElementById("editBio").value = userData.bio;
      document.getElementById("editPhoto").value = userData.photo;
      document.getElementById("profileModal").style.display = "flex";
    }

    // --- ACCORDION (PASTA DE ÁUDIOS) ---
    function toggleAccordion(header) {
      header.classList.toggle("active");
      const content = header.nextElementSibling;
      content.style.display = content.style.display === "block" ? "none" : "block";
    }

    // --- BARRA DE PESQUISA & SEGURAR PARA CRIAR GRUPO ---
    function searchGroups() {
      const query = document.getElementById("groupSearchInput").value.toLowerCase().trim();
      const listContainer = document.getElementById("groupList");
      listContainer.innerHTML = "";

      if (query === "") return;

      const filtered = groups.filter(g => g.name.toLowerCase().includes(query));
      filtered.forEach(g => {
        const item = document.createElement("div");
        item.className = "group-item";
        item.innerHTML = `<div><strong>${g.name}</strong> (ID: ${g.id})<br><small>${g.bio}</small></div>`;
        listContainer.appendChild(item);
      });
    }

    function setupHoldToCreateGroup() {
      const searchBar = document.getElementById("groupSearchInput");

      const startHold = () => {
        holdTimer = setTimeout(() => {
          if (!userData.isPremium) {
            alert("Apenas usuários PREMIUM podem criar grupos!");
          } else {
            openCreateGroupModal();
          }
        }, 800); // Segurar por 800ms
      };

      const cancelHold = () => {
        clearTimeout(holdTimer);
      };

      searchBar.addEventListener("mousedown", startHold);
      searchBar.addEventListener("mouseup", cancelHold);
      searchBar.addEventListener("mouseleave", cancelHold);
      searchBar.addEventListener("touchstart", startHold);
      searchBar.addEventListener("touchend", cancelHold);
    }

    function openCreateGroupModal() {
      const randomId = Math.floor(1000 + Math.random() * 9000).toString();
      document.getElementById("groupIdInput").value = randomId;
      document.getElementById("groupNameInput").value = "";
      document.getElementById("groupBioInput").value = "";
      document.getElementById("groupMemberInput").value = "";
      document.getElementById("createGroupModal").style.display = "flex";
    }

    function confirmCreateGroup() {
      const name = document.getElementById("groupNameInput").value;
      const bio = document.getElementById("groupBioInput").value;
      const id = document.getElementById("groupIdInput").value;

      if (!name) {
        alert("Preencha o nome do grupo!");
        return;
      }

      groups.push({ id, name, bio });
      alert(`Grupo "${name}" criado com sucesso!`);
      closeModal("createGroupModal");
    }

    // --- SOLICITAÇÕES / ADICIONAR MEMBROS ---
    function renderRequests() {
      const container = document.getElementById("requestsList");
      const badge = document.getElementById("notifBadge");
      container.innerHTML = "";

      if (requests.length === 0) {
        container.innerHTML = "<p>Nenhuma solicitação no momento.</p>";
        badge.style.display = "none";
        return;
      }

      badge.style.display = "inline-block";
      badge.innerText = requests.length;

      requests.forEach(req => {
        const card = document.createElement("div");
        card.className = "request-card";
        card.innerHTML = `
          <p><strong>${req.senderName}</strong> (ID: ${req.senderId}) quer adicionar você ao grupo <strong>${req.groupName}</strong>.</p>
          <div class="request-actions">
            <button class="btn btn-success" onclick="acceptRequest(${req.id})">Aceitar</button>
            <button class="btn btn-danger" onclick="rejectRequest(${req.id})">Recusar</button>
          </div>
        `;

        // Segurar para abrir menu de contexto e excluir
        card.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          showContextMenu(e.pageX, e.pageY, card, req.id);
        });

        container.appendChild(card);
      });
    }

    function openRequestsModal() {
      document.getElementById("requestsModal").style.display = "flex";
    }

    function acceptRequest(reqId) {
      alert("Convite aceito com sucesso!");
      requests = requests.filter(r => r.id !== reqId);
      renderRequests();
    }

    function rejectRequest(reqId) {
      requests = requests.filter(r => r.id !== reqId);
      renderRequests();
    }

    function showContextMenu(x, y, element, id) {
      const menu = document.getElementById("contextMenu");
      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
      menu.style.display = "block";
      targetToDelete = { element, id };
    }

    function deleteTargetItem() {
      if (targetToDelete) {
        requests = requests.filter(r => r.id !== targetToDelete.id);
        renderRequests();
        document.getElementById("contextMenu").style.display = "none";
      }
    }

    window.onclick = function() {
      document.getElementById("contextMenu").style.display = "none";
    };

    // --- SISTEMA DE PAGAMENTO PIX & PREMIUM ---
    function openPixModal() {
      document.getElementById("pixModal").style.display = "flex";
    }

    function copyPix() {
      const copyText = document.getElementById("pixKey");
      copyText.select();
      document.execCommand("copy");
      alert("Chave PIX copiada para a área de transferência!");
    }

    function simulatePixPayment() {
      userData.isPremium = true;
      localStorage.setItem("estudy_user", JSON.stringify(userData));
      loadProfile();
      alert("Pagamento verificado! Seu status PREMIUM foi ativado.");
      closeModal("pixModal");
    }

    // --- CHAT GERAL ---
    function sendMessage() {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return;

      const chatBox = document.getElementById("chatBox");
      const msg = document.createElement("div");
      msg.className = "chat-message";
      msg.innerHTML = `<strong>${userData.name}:</strong> ${text}`;
      chatBox.appendChild(msg);

      input.value = "";
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- DINOSSAUROS E DINHEIRO CAINDO ---
    function initFallingEffects() {
      const container = document.getElementById("fallingContainer");
      const items = ["🦖", "🦕", "💵", "💰", "💸"];

      setInterval(() => {
        const el = document.createElement("div");
        el.className = "falling-item";
        el.innerText = items[Math.floor(Math.random() * items.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.animationDuration = Math.random() * 3 + 2 + "s";
        container.appendChild(el);

        setTimeout(() => {
          el.remove();
        }, 5000);
      }, 600);
    }

    // --- UTILITÁRIOS ---
    function closeModal(id) {
      document.getElementById(id).style.display = "none";
    }
  </script>
</body>
</html>
