<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bloco de Notas & Anotações</title>
  <!-- Biblioteca jsPDF via CDN para exportação -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background-color: #0f172a; color: #f1f5f9; height: 100vh; overflow: hidden; user-select: none; }
    .app-layout { display: flex; height: 100vh; width: 100vw; }

    /* Sidebar */
    .sidebar { width: 260px; background-color: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 16px; }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #334155; }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand h2 { font-size: 16px; font-weight: 700; color: #f8fafc; }
    #btn-close-widget { background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; }
    #btn-close-widget:hover { color: #f1f5f9; background: #334155; }

    .section-title { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; margin-top: 12px; margin-bottom: 8px; }
    .icon-btn { background: #334155; color: #f8fafc; border: none; border-radius: 4px; width: 20px; height: 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: #2563eb; }

    .folder-list, .note-list { list-style: none; overflow-y: auto; max-height: 160px; margin-bottom: 12px; }
    .folder-item, .note-item { padding: 8px 10px; border-radius: 6px; font-size: 13px; color: #cbd5e1; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; transition: background 0.15s ease; }
    .folder-item:hover, .note-item:hover { background: #334155; }
    .folder-item.active, .note-item.active { background: #2563eb; color: #ffffff; font-weight: 600; }
    .folder-item .badge { font-size: 10px; background: rgba(255,255,255,0.15); padding: 2px 6px; border-radius: 10px; }

    .sidebar-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid #334155; font-size: 11px; color: #94a3b8; }
    .status-indicator { display: flex; align-items: center; gap: 6px; }
    .status-indicator .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }

    /* Area do Editor */
    .main-editor { flex: 1; display: flex; flex-direction: column; background-color: #0f172a; }
    .editor-header { height: 56px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
    .note-info { display: flex; align-items: center; gap: 10px; }
    #note-title-input { background: transparent; border: 1px solid transparent; color: #f8fafc; font-size: 16px; font-weight: 600; padding: 4px 8px; border-radius: 4px; outline: none; }
    #note-title-input:focus { border-color: #3b82f6; background: #0f172a; }
    .meta-tag { font-size: 10px; background: #334155; color: #94a3b8; padding: 3px 8px; border-radius: 12px; }

    .actions-bar { display: flex; gap: 8px; }
    .btn { padding: 6px 12px; font-size: 12px; font-weight: 500; border-radius: 6px; border: none; cursor: pointer; transition: background 0.15s ease; }
    .btn-secondary { background: #334155; color: #f8fafc; }
    .btn-secondary:hover { background: #475569; }
    .btn-danger-soft { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
    .btn-danger-soft:hover { background: rgba(239, 68, 68, 0.3); }
    /* Ferramentas de Desenho */
    .drawing-toolbar { height: 48px; background: #182232; border-bottom: 1px solid #334155; display: flex; align-items: center; padding: 0 16px; gap: 16px; }
    .tool-group { display: flex; align-items: center; gap: 8px; }
    .tool-group.right { margin-left: auto; }
    .tool-btn { background: #334155; color: #cbd5e1; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .tool-btn.active { background: #2563eb; color: #ffffff; font-weight: 600; }
    .label { font-size: 11px; color: #94a3b8; }
    #brush-size { width: 80px; cursor: pointer; }
    #size-display { font-size: 11px; color: #cbd5e1; min-width: 25px; }

    .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
    .color-dot.active { border-color: #ffffff; transform: scale(1.15); }
    #custom-color-picker { width: 24px; height: 24px; border: none; border-radius: 50%; background: none; cursor: pointer; }

    /* Canvas / Folha Finita */
    .canvas-viewport { flex: 1; overflow: auto; background-color: #0b0f19; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
    .page-sheet { background: #ffffff; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); border-radius: 4px; position: relative; background-image: linear-gradient(#f1f5f9 1px, transparent 1px); background-size: 100% 28px; }
    #paint-canvas { display: block; cursor: crosshair; touch-action: none; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand"><span class="icon">📓</span><h2>Anotações</h2></div>
        <button id="btn-close-widget" title="Fechar Widget">✖</button>
      </div>

      <div class="section-title">PASTAS <button id="btn-add-folder" class="icon-btn" title="Nova Pasta">+</button></div>
      <ul id="folder-list" class="folder-list"></ul>

      <div class="section-title">NOTAS DA PASTA <button id="btn-add-note" class="icon-btn" title="Nova Nota">+</button></div>
      <ul id="note-list" class="note-list"></ul>

      <div class="sidebar-footer">
        <div class="status-indicator"><span class="dot"></span> <span id="save-status">Salvo automaticamente</span></div>
      </div>
    </aside>

    <main class="main-editor">
      <header class="editor-header">
        <div class="note-info">
          <input type="text" id="note-title-input" value="Minha Anotação" placeholder="Título da Nota...">
          <span id="note-meta" class="meta-tag">Página Finita</span>
        </div>

        <div class="actions-bar">
          <button id="btn-export-pdf" class="btn btn-secondary">📄 PDF</button>
          <button id="btn-transfer-export" class="btn btn-secondary">🔄 Exportar (JSON)</button>
          <label class="btn btn-secondary btn-file">
            📥 Importar
            <input type="file" id="btn-transfer-import" accept=".json" style="display:none;">
          </label>
        </div>
      </header>

      <div class="drawing-toolbar">
        <div class="tool-group">
          <button id="tool-pen" class="tool-btn active">✏️ Caneta</button>
          <button id="tool-eraser" class="tool-btn">🧹 Borracha</button>
        </div>

        <div class="tool-group">
          <span class="label">Espessura:</span>
          <input type="range" id="brush-size" min="1" max="25" value="3">
          <span id="size-display">3px</span>
        </div>

        <div class="tool-group colors">
          <span class="label">Cores:</span>
          <button class="color-dot active" data-color="#000000" style="background:#000000;"></button>
          <button class="color-dot" data-color="#2563eb" style="background:#2563eb;"></button>
          <button class="color-dot" data-color="#dc2626" style="background:#dc2626;"></button>
          <button class="color-dot" data-color="#16a34a" style="background:#16a34a;"></button>
          <button class="color-dot" data-color="#d97706" style="background:#d97706;"></button>
          <button class="color-dot" data-color="#9333ea" style="background:#9333ea;"></button>
          <input type="color" id="custom-color-picker" value="#000000">
        </div>

        <div class="tool-group right">
          <button id="btn-clear-canvas" class="btn btn-danger-soft">🗑️ Limpar Folha</button>
        </div>
      </div>

      <div class="canvas-viewport">
        <div class="page-sheet">
          <canvas id="paint-canvas" width="600" height="800"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script>
    const appState = {
      folders: [
        { id: 'f_geral', name: 'Geral' },
        { id: 'f_matematica', name: 'Matemática' },
        { id: 'f_programacao', name: 'Programação' }
      ],
      activeFolderId: 'f_geral',
      notes: [
        { id: 'n_1', folderId: 'f_geral', title: 'Minhas Anotações', canvasData: null, updatedAt: Date.now() }
      ],
      activeNoteId: 'n_1',
      tool: 'pen',
      color: '#000000',
      brushSize: 3,
      isDrawing: false
    };

    const canvas = document.getElementById('paint-canvas');
    const ctx = canvas.getContext('2d');

    function loadState() {
      const saved = localStorage.getItem('app_note_extension_data');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          appState.folders = parsed.folders || appState.folders;
          appState.notes = parsed.notes || appState.notes;
          appState.activeFolderId = parsed.activeFolderId || appState.folders[0].id;
          appState.activeNoteId = parsed.activeNoteId || appState.notes[0]?.id;
        } catch(e) {}
      }
    }

    function saveState() {
      saveCurrentCanvasToNote();
      localStorage.setItem('app_note_extension_data', JSON.stringify({
        folders: appState.folders,
        notes: appState.notes,
        activeFolderId: appState.activeFolderId,
        activeNoteId: appState.activeNoteId
      }));
      document.getElementById('save-status').textContent = 'Salvo às ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    function saveCurrentCanvasToNote() {
      const currentNote = appState.notes.find(n => n.id === appState.activeNoteId);
      if (currentNote) {
        currentNote.canvasData = canvas.toDataURL();
        currentNote.title = document.getElementById('note-title-input').value || 'Sem Título';
        currentNote.updatedAt = Date.now();
      }
    }

    function renderFolders() {
      const list = document.getElementById('folder-list');
      list.innerHTML = '';
      appState.folders.forEach(folder => {
        const noteCount = appState.notes.filter(n => n.folderId === folder.id).length;
        const li = document.createElement('li');
        li.className = folder-item ${folder.id === appState.activeFolderId ? 'active' : ''};
        li.innerHTML = <span>📁 ${folder.name}</span> <span class="badge">${noteCount}</span>;
        li.onclick = () => {
          appState.activeFolderId = folder.id;
          const firstNote = appState.notes.find(n => n.folderId === folder.id);
          if (firstNote) appState.activeNoteId = firstNote.id;
          renderFolders(); renderNotes(); loadActiveNoteContent(); saveState();
        };
        list.appendChild(li);
      });
    }

    function renderNotes() {
      const list = document.getElementById('note-list');
      list.innerHTML = '';
      const filtered = appState.notes.filter(n => n.folderId === appState.activeFolderId);
      filtered.forEach(note => {
        const li = document.createElement('li');
        li.className = note-item ${note.id === appState.activeNoteId ? 'active' : ''};
        li.innerHTML = <span>📝 ${note.title}</span>;
        li.onclick = () => {
          saveCurrentCanvasToNote();
          appState.activeNoteId = note.id;
          renderNotes(); loadActiveNoteContent(); saveState();
        };
        list.appendChild(li);
      });
    }

    function loadActiveNoteContent() {
      const note = appState.notes.find(n => n.id === appState.activeNoteId);
      if (!note) return;
      document.getElementById('note-title-input').value = note.title;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (note.canvasData) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = note.canvasData;
      }
    }

    function initCanvas() {
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }
      function startDraw(e) { appState.isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
      function draw(e) {
        if (!appState.isDrawing) return;
        const p = getPos(e);
        ctx.lineWidth = appState.tool === 'eraser' ? appState.brushSize * 4 : appState.brushSize;
        ctx.strokeStyle = appState.tool === 'eraser' ? '#ffffff' : appState.color;
        ctx.lineTo(p.x, p.y); ctx.stroke();
      }
      function stopDraw() { if (appState.isDrawing) { appState.isDrawing = false; saveState(); } }

      canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDraw); canvas.addEventListener('mouseleave', stopDraw);
      canvas.addEventListener('touchstart', (e) => { startDraw(e.touches[0]); e.preventDefault(); });
      canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
      canvas.addEventListener('touchend', stopDraw);
    }

    function initControls() {
      document.getElementById('tool-pen').onclick = () => { appState.tool = 'pen'; updateToolUI(); };
      document.getElementById('tool-eraser').onclick = () => { appState.tool = 'eraser'; updateToolUI(); };
      
      function updateToolUI() {
        document.getElementById('tool-pen').classList.toggle('active', appState.tool === 'pen');
        document.getElementById('tool-eraser').classList.toggle('active', appState.tool === 'eraser');
      }

      document.getElementById('brush-size').oninput = (e) => {
        appState.brushSize = e.target.value;
        document.getElementById('size-display').textContent = e.target.value + 'px';
      };

      document.querySelectorAll('.color-dot').forEach(dot => {
        dot.onclick = () => {
          document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
          dot.classList.add('active'); appState.color = dot.dataset.color; appState.tool = 'pen'; updateToolUI();
        };
      });

      document.getElementById('custom-color-picker').oninput = (e) => { appState.color = e.target.value; appState.tool = 'pen'; updateToolUI(); };
      document.getElementById('btn-clear-canvas').onclick = () => { if (confirm('Limpar esta folha?')) { ctx.clearRect(0, 0, canvas.width, canvas.height); saveState(); } };

      document.getElementById('btn-add-folder').onclick = () => {
        const name = prompt('Nome da Pasta:');
        if (name) {
          const f = { id: 'f_' + Date.now(), name };
          appState.folders.push(f); appState.activeFolderId = f.id;
          renderFolders(); renderNotes(); saveState();
        }
      };

      document.getElementById('btn-add-note').onclick = () => {
        const n = { id: 'n_' + Date.now(), folderId: appState.activeFolderId, title: 'Nova Nota', canvasData: null, updatedAt: Date.now() };
        appState.notes.push(n); appState.activeNoteId = n.id;
        renderFolders(); renderNotes(); loadActiveNoteContent(); saveState();
      };
      document.getElementById('note-title-input').onchange = () => { saveState(); renderNotes(); };
      document.getElementById('btn-close-widget').onclick = () => { window.parent.postMessage({ type: 'CLOSE_NOTE_WIDGET' }, '*'); };

      // PDF
      document.getElementById('btn-export-pdf').onclick = () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/png');
        const currentNote = appState.notes.find(n => n.id === appState.activeNoteId);
        pdf.setFontSize(16); pdf.text(currentNote ? currentNote.title : 'Anotação', 15, 15);
        pdf.addImage(imgData, 'PNG', 15, 25, 180, 240);
        pdf.save((currentNote ? currentNote.title : 'anotacao') + '.pdf');
      };

      // Exportar JSON (Transferir)
      document.getElementById('btn-transfer-export').onclick = () => {
        saveState();
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState, null, 2));
        const a = document.createElement('a'); a.href = dataStr; a.download = notas_backup_${Date.now()}.json;
        document.body.appendChild(a); a.click(); a.remove();
      };

      // Importar JSON
      document.getElementById('btn-transfer-import').onchange = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const imp = JSON.parse(evt.target.result);
            if (imp.folders && imp.notes) {
              appState.folders = imp.folders; appState.notes = imp.notes;
              appState.activeFolderId = imp.folders[0]?.id || 'f_geral';
              appState.activeNoteId = imp.notes[0]?.id || 'n_1';
              renderFolders(); renderNotes(); loadActiveNoteContent(); saveState();
              alert('Dados importados com sucesso!');
            }
          } catch(err) { alert('Arquivo JSON inválido!'); }
        };
        reader.readAsText(file);
      };
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadState(); initCanvas(); initControls(); renderFolders(); renderNotes(); loadActiveNoteContent();
    });
  </script>
</body>
</html>
